<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Codex Pulse</title>
    <style>
      :root {
        color: #18130f;
        color-scheme: light;
        font-family: 'Avenir Next', 'Helvetica Neue', sans-serif;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 18% 18%, rgba(243, 180, 106, 0.14), transparent 28%),
          radial-gradient(circle at 82% 14%, rgba(77, 108, 123, 0.1), transparent 26%),
          linear-gradient(180deg, #fbf7ef 0%, #f0e6d6 100%);
      }

      #root {
        min-height: 100vh;
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(100%, 460px);
        padding: 28px;
        border-radius: 28px;
        border: 1px solid rgba(61, 42, 22, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 251, 245, 0.96), rgba(247, 238, 223, 0.92)),
          rgba(255, 251, 245, 0.9);
        box-shadow: 0 14px 32px rgba(46, 29, 14, 0.08);
      }

      .boot-eyebrow {
        display: block;
        margin: 0 0 10px;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        font-size: 0.72rem;
      }

      .boot-card h1 {
        margin: 0;
        font-family: 'Cochin', 'Hoefler Text', 'Iowan Old Style', serif;
        font-size: clamp(2.6rem, 8vw, 3.8rem);
        line-height: 0.94;
        letter-spacing: -0.05em;
      }

      .boot-card p {
        margin: 14px 0 0;
        color: rgba(26, 20, 14, 0.7);
        line-height: 1.55;
        font-size: 0.95rem;
      }

      .boot-track {
        position: relative;
        height: 10px;
        margin-top: 22px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(47, 72, 88, 0.1);
      }

      .boot-track span {
        position: absolute;
        inset: 0 auto 0 0;
        width: 38%;
        border-radius: inherit;
        background: linear-gradient(90deg, #cb8a3d 0%, #f7bd79 100%);
        animation: boot-track 1.7s ease-in-out infinite;
      }

      @keyframes boot-track {
        0% {
          transform: translateX(-35%);
        }

        50% {
          transform: translateX(145%);
        }

        100% {
          transform: translateX(-35%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-track span {
          animation: none;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-shell" aria-label="Loading Codex Pulse">
        <section class="boot-card" aria-live="polite">
          <span class="boot-eyebrow">Codex Pulse</span>
          <h1>Loading usage data</h1>
          <p>Preparing the dashboard shell and warming the latest snapshot.</p>
          <div class="boot-track" aria-hidden="true">
            <span></span>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
